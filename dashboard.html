<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rover Telemetry</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; padding: 1.5rem; }
  h1 { font-size: 1.1rem; font-weight: 500; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 1.25rem; }
  .status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; margin-left: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; transition: background 0.3s; }
  .dot.on { background: #22c55e; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: #1e2230; border: 1px solid #2d3348; border-radius: 10px; padding: 0.75rem 1rem; }
  .metric .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
  .metric .val { font-size: 1.4rem; font-weight: 500; font-family: monospace; margin-top: 4px; color: #e2e8f0; }
  .metric .unit { font-size: 11px; color: #64748b; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .chart-card { background: #1e2230; border: 1px solid #2d3348; border-radius: 10px; padding: 1rem; }
  .chart-card h2 { font-size: 12px; font-weight: 500; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
  canvas { max-height: 180px; }
  .latency-bar { margin-top: 1rem; background: #1e2230; border: 1px solid #2d3348; border-radius: 10px; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 12px; font-size: 13px; color: #64748b; }
  #latency-val { font-size: 1.1rem; font-weight: 500; color: #38bdf8; font-family: monospace; }
  @media (max-width: 600px) { .charts { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>
  Red Horizon Rover — Live Telemetry
  <span class="status"><span class="dot" id="dot"></span><span id="status-text">connecting...</span></span>
</h1>

<div class="metrics">
  <div class="metric"><div class="label">Pos X</div><div class="val" id="pos-x">—</div><div class="unit">m</div></div>
  <div class="metric"><div class="label">Pos Y</div><div class="val" id="pos-y">—</div><div class="unit">m</div></div>
  <div class="metric"><div class="label">Lin vel</div><div class="val" id="vel-lin">—</div><div class="unit">m/s</div></div>
  <div class="metric"><div class="label">Ang vel</div><div class="val" id="vel-ang">—</div><div class="unit">rad/s</div></div>
  <div class="metric"><div class="label">Acc Z</div><div class="val" id="acc-z">—</div><div class="unit">m/s²</div></div>
  <div class="metric"><div class="label">Gyro Z</div><div class="val" id="gyro-z">—</div><div class="unit">rad/s</div></div>
</div>

<div class="charts">
  <div class="chart-card">
    <h2>Acceleration (m/s²)</h2>
    <canvas id="acc-chart"></canvas>
  </div>
  <div class="chart-card">
    <h2>Velocity (m/s &amp; rad/s)</h2>
    <canvas id="vel-chart"></canvas>
  </div>
  <div class="chart-card">
    <h2>Position (m)</h2>
    <canvas id="pos-chart"></canvas>
  </div>
  <div class="chart-card">
    <h2>Gyroscope (rad/s)</h2>
    <canvas id="gyro-chart"></canvas>
  </div>
</div>

<div class="latency-bar">
  Network latency: <span id="latency-val">— ms</span>
  &nbsp;|&nbsp; Packets received: <span id="pkt-count">0</span>
  &nbsp;|&nbsp; QoS: 0 (fire &amp; forget)
</div>

<script>
const MAX_POINTS = 60;
let pktCount = 0;

function makeChart(id, labels, datasets) {
  return new Chart(document.getElementById(id), {
    type: 'line',
    data: { labels: Array(MAX_POINTS).fill(''), datasets },
    options: {
      animation: false,
      responsive: true,
      plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 12, font: { size: 11 } } } },
      scales: {
        x: { display: false },
        y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#2d3348' } }
      }
    }
  });
}

function push(chart, ...values) {
  chart.data.datasets.forEach((ds, i) => {
    ds.data.push(values[i]);
    if (ds.data.length > MAX_POINTS) ds.data.shift();
  });
  chart.update('none');
}

const accChart  = makeChart('acc-chart',  [], [
  { label: 'X', data: [], borderColor: '#f472b6', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
  { label: 'Y', data: [], borderColor: '#38bdf8', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
  { label: 'Z', data: [], borderColor: '#a3e635', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
]);
const velChart  = makeChart('vel-chart',  [], [
  { label: 'Linear',  data: [], borderColor: '#fb923c', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
  { label: 'Angular', data: [], borderColor: '#c084fc', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
]);
const posChart  = makeChart('pos-chart',  [], [
  { label: 'X', data: [], borderColor: '#34d399', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
  { label: 'Y', data: [], borderColor: '#fbbf24', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
]);
const gyroChart = makeChart('gyro-chart', [], [
  { label: 'X', data: [], borderColor: '#f472b6', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
  { label: 'Y', data: [], borderColor: '#38bdf8', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
  { label: 'Z', data: [], borderColor: '#a3e635', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
]);

// 
const BROKER_WS = 'ws://localhost:9001';

const client = mqtt.connect(BROKER_WS);

client.on('connect', () => {
  document.getElementById('dot').classList.add('on');
  document.getElementById('status-text').textContent = 'connected';
  client.subscribe('rover/#');
});

client.on('error', () => {
  document.getElementById('status-text').textContent = 'error — check broker';
});

client.on('close', () => {
  document.getElementById('dot').classList.remove('on');
  document.getElementById('status-text').textContent = 'disconnected';
});

client.on('message', (topic, payload) => {
  const d = JSON.parse(payload.toString());
  pktCount++;
  document.getElementById('pkt-count').textContent = pktCount;

  if (d.ts) {
    const latency = ((Date.now() / 1000) - d.ts) * 1000;
    document.getElementById('latency-val').textContent = latency.toFixed(1) + ' ms';
  }

  if (topic === 'rover/imu') {
    document.getElementById('acc-z').textContent  = d.acc.z.toFixed(2);
    document.getElementById('gyro-z').textContent = d.gyro.z.toFixed(3);
    push(accChart,  d.acc.x,  d.acc.y,  d.acc.z);
    push(gyroChart, d.gyro.x, d.gyro.y, d.gyro.z);
  }

  if (topic === 'rover/odom') {
    document.getElementById('pos-x').textContent   = d.pos.x.toFixed(2);
    document.getElementById('pos-y').textContent   = d.pos.y.toFixed(2);
    document.getElementById('vel-lin').textContent = d.vel.linear.toFixed(3);
    document.getElementById('vel-ang').textContent = d.vel.angular.toFixed(3);
    push(velChart, d.vel.linear, d.vel.angular);
    push(posChart, d.pos.x, d.pos.y);
  }
});
</script>
</body>
</html>
